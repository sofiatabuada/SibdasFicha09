<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISEP Ginásio</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="../../assets/bootstrap/bootstrap.min.css">

    <!-- favicon -->
    <link rel="shortcut icon" href="../../assets/img/gym125.png" type="image/png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="../../assets/fontawesome/all.min.css">

    <!-- estilos -->
    <link rel="stylesheet" href="../../assets/css/app.css">
</head>

<body>

    <!-- Navbar -->
    <header class="container-fluid bg-dark text-white">
        <div class="row align-items-center">

            <div class="col-6 d-flex align-items-center p-3">
                <a href="../../index.html">
                    <img alt="Logo do ISEP Ginásio" height="40" src="../../assets/img/gym125_white.png" class="me-3">
                </a>
                <h3 class="mb-0">ISEP Ginásio</h3>
            </div>

            <div class="col-6 text-end p-3">
                <div class="dropdown">
                    <button class="btn btn-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown">
                        <i class="fa-regular fa-user me-2"></i> Utilizador
                    </button>

                    <ul class="dropdown-menu dropdown-menu-end">
                        <li>
                            <a class="dropdown-item" href="#">
                                <i class="fa-solid fa-key me-2"></i> Alterar password
                            </a>
                        </li>
                        <li>
                            <hr class="dropdown-divider">
                        </li>
                        <li>
                            <a class="dropdown-item" href="../../login/login.html">
                                <i class="fa-solid fa-right-from-bracket me-2"></i> Sair
                            </a>
                        </li>
                    </ul>
                </div>
            </div>

        </div>
    </header>

    <div class="container-fluid">
        <div class="row">

            <!-- Sidebar -->
            <aside class="col-md-3 col-lg-2 bg-secondary text-white p-3 min-vh-100">

                <h4>Menu</h4>

                <nav>
                    <a href="lista.html" class="nav-link text-white px-0 mb-2 d-block">
                        <i class="fas fa-users"></i> Clientes
                    </a>

                    <a href="../agendamento/agendamento.html" class="nav-link text-white px-0 mb-2 d-block">
                        <i class="fas fa-calendar-alt"></i> Agendamento de treinos
                    </a>

                    <a href="../plano_treino/plano_treino.html" class="nav-link text-white px-0 mb-2 d-block">
                        <i class="fas fa-dumbbell"></i> Planos de Treino
                    </a>

                    <a href="../equipamentos/equipamentos.html" class="nav-link text-white px-0 mb-2 d-block">
                        <i class="fas fa-cogs"></i> Equipamentos
                    </a>

                    <a href="../produtos_servicos/produtos_servicos.html" class="nav-link text-white px-0 mb-2 d-block">
                        <i class="fas fa-box-open"></i> Produtos e Serviços
                    </a>
                </nav>

            </aside>

            <!-- Conteúdo Principal -->
            <main class="col-md-9 col-lg-10 p-4">

                <div class="d-flex justify-content-center mt-4">
                    <div class="card w-100 shadow rounded" style="max-width: 1200px;">
                        <div class="card-body">

                            <h2 class="mb-4">
                                <strong>
                                    <i class="fa-solid fa-pen-to-square me-2"></i> Editar cliente
                                </strong>
                            </h2>

                            <hr>

                            <form action="#" method="post" novalidate>

                                <div class="mb-3">
                                    <label class="form-label">Nome Completo</label>
                                    <input type="text" class="form-control" value="João Silva" required>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Morada</label>
                                    <input type="text" class="form-control" value="Rua das Flores, nº12">
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Código Postal</label>
                                    <input type="text" class="form-control" value="4000-123" required>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Cidade</label>
                                    <input type="text" class="form-control" value="Porto" required>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Telefone</label>
                                    <input type="text" class="form-control" value="912345678" required>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Email</label>
                                    <input type="email" class="form-control" value="joao@email.com" required>
                                </div>

                                <!-- Sexo -->
                                <div class="mb-3">
                                    <label class="form-label d-block">Sexo</label>

                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="radio" name="radio_gender" value="m"
                                            checked>
                                        <label class="form-check-label">Masculino</label>
                                    </div>

                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="radio" name="radio_gender" value="f">
                                        <label class="form-check-label">Feminino</label>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Data de nascimento</label>
                                    <input type="date" class="form-control" value="1995-05-10" required>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Estado Civil</label>
                                    <select class="form-select">
                                        <option>Escolha uma opção</option>
                                        <option value="solt">Solteiro</option>
                                        <option value="casd" selected>Casado</option>
                                        <option value="ufat">União de Facto</option>
                                    </select>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Sistema de Saúde</label>
                                    <input type="text" class="form-control" value="SNS">
                                </div>

                                <div class="mt-3">
                                    <a href="lista.html" class="btn btn-secondary me-2">
                                        <i class="fa-solid fa-xmark me-1"></i> Cancelar
                                    </a>

                                    <button type="submit" class="btn btn-warning">
                                        <i class="fa-regular fa-floppy-disk me-1"></i> Guardar alterações
                                    </button>
                                </div>

                                <div class="alert alert-danger mt-3 d-none">
                                    Erro simples
                                </div>

                            </form>

                        </div>
                    </div>
                </div>

            </main>

        </div>
    </div>

    <script src="../../assets/bootstrap/bootstrap.bundle.min.js"></script>

</body>

</html>
